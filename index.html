        #progress-wrapper { width: 100%; height: 20px; border: 1px solid #0f0; position: relative; overflow: hidden; }

        header {

        .container { padding: 20px; display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 10; }
        .panel {

        }
        #horror-pop::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.5) 1px, transparent 1px, transparent 2px);

        .glitch-active { animation: text-glitch 0.08s infinite, text-morph 1.5s infinite; }

        @keyframes text-glitch {
            0% { transform: translate(3px, -3px); text-shadow: -4px 0 #f0f, 4px 0 #0ff; }

        @keyframes text-morph {

            20% { content: "死死死死死死"; }

        @keyframes tv-shake {
            0% { transform: translate(0,0) scale(1); filter: contrast(1.2); }
            25% { transform: translate(8px, -4px) scale(1.02); }
            75% { transform: translate(-8px, 4px) skewX(2deg); background: #1a0000; }
            100% { transform: translate(0,0); }

        @keyframes virus-float { 0% { opacity: 0; transform: scale(0.3) rotate(-20deg); } 25% { opacity: 1; } 100% { opacity: 0; transform: translateY(-300px) scale(3.5) rotate(20deg); } }

        #btn-banana-no { background: #000; color: #fff; }

        /* VIRUS ANIMATIONS */

        @keyframes flash-red-bg { 0% { background: #000; } 50% { background: #400; } 100% { background: #000; } }
    </style>

            events: { onReady: (e) => { e.target.setVolume(35); checkReady(); } }

        players.hai = new YT.Player('player-hai', { videoId: '7jfoXGh77xA', events: { onReady: checkReady } });
        players.chan = new YT.Player('player-chan', { videoId: 'Wj7_EJR755o', events: { onReady: checkReady } });

    // START BUTTON LOGIC
    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('loader-container').style.display = 'block';
        
        const log = document.getElementById('hack-log');
        const bar = document.getElementById('progress-bar');
        const pct = document.getElementById('percent-text');
        
        const hackMessages = [
            "CONNECTING TO REMOTE SERVER [191.98.10.254]...",
            "BYPASSING WINDOWS DEFENDER...",
            "EXPLOITING BROWSER VULNERABILITY...",
            "LOCAL_IP_LEAKED: 124.XXX.XXX.XXX",
            "SCANNING PERSONAL FILES...",

            "UPLOADING TO DARKNET...",

                document.body.classList.add('flash-red-alert');
                setTimeout(() => {
                    document.body.classList.remove('flash-red-alert');
                    startMainSystem();

            } else {
                progress += Math.random() * 6;
                if(progress > 100) progress = 100;
                bar.style.width = progress + '%';
                pct.innerText = Math.floor(progress) + '%';
                
                if(Math.random() > 0.65) {
                    const line = document.createElement('div');
                    line.innerText = `> ${hackMessages[msgIdx % hackMessages.length]} [OK]`;
                    log.appendChild(line);
                    log.scrollTop = log.scrollHeight;
                    msgIdx++;
                }
            }
        }, 90);
    };

    function startMainSystem() {
        document.getElementById('start-overlay').style.display = 'none';
        if (players.bgm) players.bgm.playVideo();
        document.getElementById('user-ip').innerText = `124.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.XXX`;

        // 1分後の地獄（救済演出）
        setTimeout(() => {
            matrixSpeed = 15; // 背景を高速化
            const p = document.getElementById('horror-pop');
            p.style.top = '0';
            p.classList.add('tv-broken-active');
            document.getElementById('horror-text').classList.add('glitch-active');
            
            p.onclick = (e) => { 
                if(e.target.id !== 'close-horror') {
                    Object.values(players).forEach(p => { if(p.pauseVideo) p.pauseVideo(); });
                    window.location.href = PH_LINK; 
                }
            };
            setTimeout(startDanmaku, 3000);
        }, 60000);

        // 6秒バナナポップアップ
        setInterval(() => {
            document.getElementById('popup').style.display = 'block';
        }, 6000);

        // 8秒エロバナー
        setInterval(() => {
            const b = document.getElementById('erotic-banner');
            b.style.display = 'flex'; b.style.bottom = '0px';
            setTimeout(() => b.style.bottom = '-120px', 4000);

    // HISSA 召喚ロジック（連打耐性強化）
    document.getElementById('main-summon-btn').onclick = () => {
        // 音声を最初から強制再生（連打対応）
        if (players.summon) { 
            players.summon.seekTo(0); 
            players.summon.playVideo(); 
        }

        // 0.6%の確率で大当たり
        if (Math.random() < 0.006) {
            let count = parseInt(localStorage.getItem('hissa_lucky_count') || 0) + 1;
            localStorage.setItem('hissa_lucky_count', count);
            document.getElementById('lucky-count').innerText = count;
            document.body.classList.add('flash-red-alert');
            
            if (players.chan) { players.chan.seekTo(0); players.chan.playVideo(); }
            createFloatingText("ウフンっ♡ｿｳﾖﾝｯ♡", "#ff00ff");

        // 通常セリフ
        const msgs = [

            "ハイパーボぃぃぃぃスッ！！！", "スー↴パー↴ボイース↗", "歓迎よ〜",
            "マッチッポンプッ", "ガッタイ！！", "アンタなぁ〜", "救済が必要ですな"
        ];
        createFloatingText(msgs[Math.floor(Math.random()*msgs.length)]);
    };

    function createFloatingText(txt, color) {
        const h = document.createElement('div');
        h.className = 'hissa-text';
        h.innerText = txt;
        h.style.left = (Math.random()*70 + 15) + '%';
        h.style.top = (Math.random()*40 + 30) + '%';
        h.style.color = color || (txt.includes('♡') ? "#ff00ff" : "#0f0");
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 750);
    }

    // 弾幕（ニコニコ風）
    function startDanmaku() {
        const timer = setInterval(() => {
            const b = document.createElement('div');
            b.className = 'danmaku';
            b.innerText = "ぽるのはぶはこちら";
            b.style.top = (Math.random() * 85 + 5) + "%";
            b.style.left = "110%";
            b.animate([
                { left: '110%' },
                { left: '-150%' }
            ], { duration: 3500, iterations: 1 });
            
            b.onclick = (e) => { 
                e.stopPropagation(); 
                Object.values(players).forEach(p => { if(p.pauseVideo) p.pauseVideo(); });
                window.location.href = PH_LINK; 
            };
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 3500);
            
            // 救済演出が終わっていたら停止
            if(document.getElementById('horror-pop').style.top !== '0px') clearInterval(timer);
        }, 380);
    }

    // BUTTON ACTIONS
    document.getElementById('close-horror').onclick = (e) => { 
        e.stopPropagation(); 
        Object.values(players).forEach(p => { if(p.pauseVideo) p.pauseVideo(); });
        window.location.href = ALT_LINK; 
    };
    document.getElementById('erotic-banner').onclick = () => { window.location.href = HERR_LINK; };
    document.getElementById('btn-banana-no').onclick = () => { 
        document.getElementById('popup').style.display='none'; 
        if(players.hai) { players.hai.seekTo(0); players.hai.playVideo(); }
    };
    document.getElementById('btn-banana-yes').onclick = () => { 
        Object.values(players).forEach(p => { if(p.pauseVideo) p.pauseVideo(); });
        window.location.href = "https://youtu.be/9i53HSOS3U4"; 
    };

    // MATRIX ANIMATION
    const canvas = document.getElementById('matrix'), ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();
    
    const drops = Array(Math.floor(canvas.width/15)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0";
        ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const char = "01HISSA"[Math.floor(Math.random()*7)];
            ctx.fillText(char, i*15, y*15);
            if(y*15 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 45); // matrixSpeedを反映させる場合はここを動的に変更
</script>
