<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code 1919810 [Ver.HISSA]</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        
        /* 起動画面 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #start-btn { padding: 25px 50px; border: 2px solid #0f0; background: none; color: #0f0; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px #0f0; }
        #start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #loader-container { display: none; width: 300px; margin-top: 20px; text-align: center; }
        #progress-wrapper { width: 100%; height: 10px; border: 1px solid #0f0; position: relative; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; box-shadow: 0 0 10px #0f0; transition: width 0.1s; }
        #percent-text { color: #0f0; font-size: 1.2rem; margin-top: 10px; font-weight: bold; letter-spacing: 2px; }

        header { padding: 10px; border-bottom: 2px solid #0f0; background: rgba(0, 20, 0, 0.9); text-align: center; }
        .container { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .panel { border: 1px solid #0f0; padding: 10px; background: rgba(0, 10, 0, 0.85); box-shadow: inset 0 0 8px #0f0; font-size: 0.85rem; }
        .btn-summon { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .lucky-counter { color: #ff00ff; font-weight: bold; font-size: 1.1rem; }

        /* 救済演出：降りてくる最中から文字があり、徐々に迫る */
        #horror-pop { 
            position: fixed; 
            top: -120%; /* 画面外の上部 */
            left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 8000; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; 
            pointer-events: none;
            /* 降りてくる動きの設定 */
            transition: top 5s cubic-bezier(0.1, 0.7, 1.0, 0.1); 
        }
        
        #horror-text { 
            color: #f00; font-size: 3rem; font-weight: bold; text-align: center; 
            white-space: nowrap; line-height: 1.2;
            /* 文字化けと徐々に巨大化するアニメーション */
            animation: glitch 0.2s infinite; 
        }

        /* 文字化けモーション */
        @keyframes glitch {
            0% { transform: translate(2px, -2px); text-shadow: 2px 0 #fff, -2px 0 #00f; }
            50% { transform: translate(-2px, 2px); clip-path: inset(20% 0 40% 0); }
            100% { transform: translate(0); }
        }

        /* 迫ってくるモーション（JSでクラス追加して開始） */
        .zoom-active {
            animation: glitch 0.2s infinite, zoomForward 15s linear forwards !important;
        }

        @keyframes zoomForward {
            from { transform: scale(1); }
            to { transform: scale(40); opacity: 0; }
        }

        #close-horror { position: absolute; top: 10px; right: 10px; color: #300; font-size: 1rem; cursor: pointer; z-index: 8001; pointer-events: auto; }
        .danmaku { position: fixed; white-space: nowrap; background: #ff00ff; color: #fff; padding: 5px 15px; font-weight: bold; z-index: 9000; cursor: pointer; border-radius: 3px; }
        @keyframes nico { from { left: 100%; } to { left: -150%; } }
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 20px; border: 4px solid #ff00ff; z-index: 1000; text-align: center; width: 85%; }
        #erotic-banner { display: none; position: fixed; bottom: -80px; left: 0; width: 100%; height: 50px; background: #ff00ff; color: #fff; z-index: 500; font-weight: bold; align-items: center; justify-content: center; text-decoration: none; transition: bottom 0.4s; }
        .hissa-text { position: absolute; font-weight: bold; pointer-events: none; animation: float 1s forwards; z-index: 100; font-size: 1.5rem; }
        @keyframes float { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(-150px) scale(2); } }
        #yt-player-container { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="yt-player-container">
    <div id="player-bgm"></div>
    <div id="player-hai"></div>
    <div id="player-chan"></div>
    <div id="player-summon"></div>
</div>

<div id="start-overlay">
    <button id="start-btn" onclick="runLoading()" disabled>SYSTEM INITIALIZING...</button>
    <div id="loader-container">
        <div id="progress-wrapper"><div id="progress-bar"></div></div>
        <div id="percent-text">0%</div>
    </div>
</div>

<div id="horror-pop">
    <div id="close-horror" onclick="goAlt()">×</div>
    <div id="horror-text">救済をウケる<br>死死死死死死</div>
</div>

<canvas id="matrix"></canvas>
<a href="https://m.youtube.com/@Herr0404jp" target="_blank" id="erotic-banner">貴方と今宵、愛し合いたい…♡</a>

<div id="popup">
    <p>バナナはおやつに入りますか？</p>
    <button onclick="bananaChoice('no')">はい</button>
    <button onclick="bananaChoice('yes')">Yes</button>
</div>

<header><h1>HISSA WATCHER [FINAL-VER]</h1></header>

<div class="container">
    <div class="panel">
        <div>IP: <span id="user-ip">...</span></div>
        <div class="lucky-counter">おめでた回数：<span id="lucky-count">0</span>回</div>
    </div>
    <div class="panel" style="border-color:#ff00ff; color:#ff00ff;">
        <div>LOC: <span id="hissa-pos">SEARCHING...</span></div>
        <div>STATUS: <span id="forecast">WAITING</span></div>
    </div>
    <button class="btn-summon" onclick="summonHissa()">HISSA 召喚</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let players = { bgm: null, hai: null, chan: null, summon: null };
    let readyCount = 0;

    function onYouTubeIframeAPIReady() {
        const checkReady = () => {
            readyCount++;
            if (readyCount >= 4) {
                const btn = document.getElementById('start-btn');
                btn.innerText = 'ENABLE SYSTEM'; btn.disabled = false;
            }
        };

        players.bgm = new YT.Player('player-bgm', {
            videoId: 'eap7eQOkwTI',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'eap7eQOkwTI', 'controls': 0 },
            events: { 
                onReady: (e) => { e.target.setVolume(50); checkReady(); },
                onStateChange: (e) => { 
                    // 終了した瞬間や止まった瞬間に再起動させる（常に流れるように）
                    if (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.PAUSED) {
                        e.target.playVideo(); 
                    }
                }
            }
        });

        players.hai = new YT.Player('player-hai', { videoId: '7jfoXGh77xA', events: { onReady: checkReady } });
        players.chan = new YT.Player('player-chan', { videoId: 'Wj7_EJR755o', events: { onReady: checkReady } });
        players.summon = new YT.Player('player-summon', { videoId: '6k6wCRCKLn4', events: { onReady: checkReady } });
    }

    function runLoading() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('loader-container').style.display = 'block';
        let bar = document.getElementById('progress-bar'), text = document.getElementById('percent-text'), width = 0;
        let id = setInterval(() => {
            if (width >= 100) { clearInterval(id); text.innerText = "COMPLETE"; setTimeout(startSystem, 800); }
            else { width += Math.random() * 8; if(width > 100) width = 100; bar.style.width = width + '%'; text.innerText = Math.floor(width) + '%'; }
        }, 80);
    }

    function startSystem() {
        document.getElementById('start-overlay').style.display = 'none';
        
        // 全プレイヤーを初期化
        if (players.bgm) players.bgm.playVideo();
        Object.values(players).forEach(p => { 
            if(p && p !== players.bgm && typeof p.playVideo === 'function') {
                p.playVideo(); setTimeout(() => p.pauseVideo(), 150);
            }
        });

        document.getElementById('user-ip').innerText = `124.${Math.floor(Math.random()*255)}.XXX.XXX`;
        
        // 救済のタイマー（1分）
        setTimeout(() => {
            const wrap = document.getElementById('horror-pop');
            const text = document.getElementById('horror-text');
            if(wrap && text) {
                wrap.style.top = '0'; // 降りてくる開始
                text.classList.add('zoom-active'); // 降りながら迫ってくる開始
            }
            setTimeout(startDanmaku, 6000); 
        }, 60000);
    }

    // --- その他基本機能 ---
    function summonHissa() {
        if (players.summon) { players.summon.seekTo(0); players.summon.playVideo(); }
        if (Math.random() < 0.006) {
            luckyCount++; localStorage.setItem('hissa_lucky_count', luckyCount);
            document.getElementById('lucky-count').innerText = luckyCount;
            document.body.style.backgroundColor = 'red';
            if (players.chan) { players.chan.seekTo(0); players.chan.playVideo(); }
            const h = document.createElement('div'); h.className = 'hissa-text';
            h.innerText = "ウフンっ♡ｿｳﾖﾝｯ♡"; h.style.left = '20%'; h.style.top = '30%'; h.style.color = "#ff00ff";
            document.body.appendChild(h);
            setTimeout(() => { document.body.style.backgroundColor = 'black'; h.remove(); }, 1000);
            return;
        }
        const v = ["どう、わぁたぁしぃ〜♡", "ハイパーボぃぃぃぃスッ！！！", "マッチッポンプッ", "アンタなぁ〜"];
        const txt = v[Math.floor(Math.random()*v.length)];
        const h = document.createElement('div'); h.className = 'hissa-text';
        h.innerText = txt; h.style.left = Math.random()*60+10+'%'; h.style.top = '40%';
        h.style.color = txt.includes('♡') ? "#ff00ff" : "#0f0";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(), 1000);
    }

    function bananaChoice(c){
        document.getElementById('popup').style.display='none';
        if(c==='yes') window.open("https://youtu.be/9i53HSOS3U4?si=vw5zfnWA-M3wpjxe", "_blank");
        else if (players.hai) { players.hai.seekTo(0); players.hai.playVideo(); }
    }

    const canvas = document.getElementById('matrix'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/14)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#0f0"; ctx.font = "14px monospace";
        drops.forEach((y,i)=>{
            ctx.fillText("01HISSA"[Math.floor(Math.random()*7)], i*14, y*14);
            if(y*14>canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++;
        });
    }
    setInterval(draw, 50);

    let luckyCount = localStorage.getItem('hissa_lucky_count') || 0;
    document.getElementById('lucky-count').innerText = luckyCount;

    function goAlt() { window.open("https://www.altqw.com/", "_blank"); }

    function startDanmaku() {
        setInterval(() => {
            const b = document.createElement('div'); b.className = 'danmaku'; b.innerText = "ぽるのはぶはこちら";
            b.style.top = Math.random() * 90 + "%"; b.style.animation = `nico ${Math.random() * 2 + 2}s linear forwards`;
            b.onclick = () => { window.location.href = "https://jp.pornhub.com/"; };
            document.body.appendChild(b); setTimeout(() => b.remove(), 5000);
        }, 250);
    }

    setInterval(()=> { document.getElementById('popup').style.display='block'; }, 10000);
    setInterval(()=> {
        const b = document.getElementById('erotic-banner'); b.style.display='flex'; b.style.bottom='0px';
        setTimeout(()=> b.style.bottom='-80px', 2500);
    }, 6000);
    setInterval(()=> {
        document.getElementById('hissa-pos').innerText = ["北緯35.6度", "マリアナ海溝", "ブラジル奥地", "Hissaの布団裏"][Math.floor(Math.random()*4)];
        document.getElementById('forecast').innerText = ["ガッタイ中", "ワン・ツー待機", "ウフン待ち"][Math.floor(Math.random()*3)];
    }, 3000);
</script>
</body>
</html>
